<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sessizlik">
<meta name="theme-color" content="#0a0e1a">
<title>Sessizlik</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0e1a'/%3E%3Ctext x='90' y='128' font-size='100' text-anchor='middle'%3E%F0%9F%A4%AB%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0a0e1a;
    --bg2:#0d1424;
    --card:#111a2e;
    --card-line:#1c2a45;
    --ink:#e8edf6;
    --ink-dim:#8a96ac;
    --ink-faint:#5a6680;
    --green:#34d17a;
    --green-soft:#2ecc71;
    --red:#ef5350;
    --amber:#f0a830;
    --amber2:#e8941a;
    --slot:#0f1626;
    --slot-line:#1a2640;
    --accent:#34d17a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
    min-height:100vh;
  }
  .serif{font-family:"Hoefler Text",Georgia,"Times New Roman",serif;}
  .app{
    max-width:560px;margin:0 auto;
    padding:env(safe-area-inset-top) 0 0 0;
  }
  /* ---- pages ---- */
  .page{display:none;padding:8px 18px 120px;animation:fade .25s ease;}
  .page.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* ---- header ---- */
  .ph{text-align:center;padding:22px 0 6px;}
  .ph .emoji{font-size:42px;line-height:1;}
  .ph h1{
    font-size:34px;letter-spacing:.16em;font-weight:500;margin:10px 0 4px;
    color:#dfe6f2;
  }
  .ph .sub{
    font-size:12px;letter-spacing:.22em;color:var(--ink-faint);
    text-transform:uppercase;font-weight:600;
  }

  /* ---- date nav ---- */
  .datenav{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0 8px;}
  .navbtn{
    width:52px;height:52px;border-radius:50%;border:1px solid var(--card-line);
    background:var(--bg2);color:var(--ink-dim);font-size:22px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    flex:none;transition:.15s;
  }
  .navbtn:active{background:var(--card);transform:scale(.93);}
  .calbtn{
    width:54px;height:54px;border-radius:14px;background:var(--card);
    border:1px solid var(--card-line);font-size:26px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex:none;
  }
  .calbtn:active{transform:scale(.95);}
  .datelabel{font-size:20px;color:#dde4f0;text-align:center;min-width:170px;}

  /* ---- score ring + counters ---- */
  .scoreband{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0 6px;flex-wrap:wrap;}
  .ring{position:relative;width:185px;height:185px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .scoretext{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring .scoretext .num{font-size:46px;font-weight:600;line-height:1;}
  .ring .scoretext .lbl{font-size:12px;letter-spacing:.12em;color:var(--ink-faint);margin-top:6px;}
  .counters{display:flex;flex-direction:column;gap:14px;}
  .counter{display:flex;align-items:baseline;gap:9px;}
  .counter .dot{width:13px;height:13px;border-radius:4px;flex:none;align-self:center;}
  .counter .cv{font-size:30px;font-weight:600;line-height:1;}
  .counter .cl{font-size:11px;letter-spacing:.13em;color:var(--ink-faint);text-transform:uppercase;font-weight:600;}
  .dot.g{background:var(--green);} .dot.r{background:var(--red);} .dot.b{background:#2c3a58;}
  .cv.g{color:var(--green);} .cv.r{color:var(--red);} .cv.b{color:#9fb0cc;}

  .legend{display:flex;justify-content:center;gap:26px;margin:14px 0 4px;}
  .legend span{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink-dim);}
  .legend i{width:14px;height:14px;border-radius:4px;display:inline-block;}

  /* ---- groups ---- */
  .group{margin-top:30px;}
  .grouphead{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .grouphead .gi{font-size:20px;}
  .grouphead .gt{font-size:13px;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase;font-weight:600;white-space:nowrap;}
  .grouphead .gline{flex:1;height:1px;background:linear-gradient(90deg,var(--card-line),transparent);}
  .slots{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
  @media(max-width:520px){.slots{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:360px){.slots{grid-template-columns:repeat(2,1fr);}}
  .slot{
    background:var(--slot);border:1px solid var(--slot-line);border-radius:13px;
    padding:11px 9px 10px;min-height:78px;cursor:pointer;
    display:flex;flex-direction:column;justify-content:space-between;
    transition:.12s;position:relative;
  }
  .slot:active{transform:scale(.96);}
  .slot .t{font-size:13.5px;color:#cfd8ea;line-height:1.25;font-weight:500;}
  .slot .s{font-size:11px;margin-top:7px;color:var(--ink-faint);display:flex;align-items:center;gap:4px;}
  .slot .s::before{content:"·";color:var(--ink-faint);}
  .slot.sessiz{border-color:rgba(52,209,122,.5);background:rgba(52,209,122,.07);}
  .slot.sessiz .s{color:var(--green);} .slot.sessiz .s::before{color:var(--green);}
  .slot.konustu{border-color:rgba(239,83,80,.5);background:rgba(239,83,80,.07);}
  .slot.konustu .s{color:var(--red);} .slot.konustu .s::before{color:var(--red);}
  .slot.now{box-shadow:0 0 0 2px var(--green);border-color:var(--green);}
  .slot .note-dot{position:absolute;top:8px;right:9px;width:6px;height:6px;border-radius:50%;background:var(--amber);}

  /* ---- bottom actions ---- */
  .dayactions{display:flex;gap:14px;justify-content:center;margin-top:34px;}
  .daybtn{
    background:transparent;border:1px solid var(--card-line);border-radius:13px;
    padding:14px 22px;font-size:15px;color:var(--ink-dim);cursor:pointer;
    display:flex;align-items:center;gap:7px;
  }
  .daybtn:active{background:var(--card);}

  /* ---- tabbar ---- */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:rgba(10,14,26,.92);backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-top:1px solid var(--card-line);
    display:flex;justify-content:space-around;
    padding:10px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--ink-faint);font-size:12px;letter-spacing:.08em;font-weight:600;flex:1;}
  .tab .ti{font-size:24px;filter:grayscale(.4);opacity:.7;}
  .tab.active{color:var(--green);}
  .tab.active .ti{filter:none;opacity:1;}

  /* ---- modal ---- */
  .overlay{
    position:fixed;inset:0;z-index:60;background:rgba(2,5,12,.78);
    display:none;align-items:center;justify-content:center;padding:24px;
    backdrop-filter:blur(3px);
  }
  .overlay.show{display:flex;animation:fade .18s ease;}
  .modal{
    width:100%;max-width:430px;background:#0f1830;border:1px solid var(--card-line);
    border-radius:22px;padding:26px 22px 22px;
  }
  .modal h3{font-size:26px;font-weight:500;margin:0 0 20px;text-align:left;color:#e6ecf7;}
  .mrow{display:flex;gap:14px;margin-bottom:16px;}
  .mbtn{
    flex:1;padding:18px 0;border-radius:14px;border:1px solid var(--card-line);
    background:var(--bg2);color:var(--ink-dim);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.12s;
  }
  .mbtn:active{transform:scale(.97);}
  .mbtn.sel-g{border-color:var(--green);background:rgba(52,209,122,.14);color:var(--green);}
  .mbtn.sel-r{border-color:var(--red);background:rgba(239,83,80,.14);color:var(--red);}
  .modal textarea{
    width:100%;background:var(--bg);border:1px solid var(--card-line);border-radius:14px;
    color:var(--ink);font-size:15px;padding:16px;min-height:96px;resize:none;
    font-family:inherit;margin-bottom:18px;
  }
  .modal textarea::placeholder{color:var(--ink-faint);}
  .mfoot{display:flex;align-items:center;gap:12px;}
  .mfoot .clr{margin-right:auto;background:transparent;border:1px solid rgba(239,83,80,.5);color:var(--red);border-radius:13px;padding:14px 20px;font-size:15px;cursor:pointer;}
  .mfoot .cancel{background:transparent;border:1px solid var(--card-line);color:var(--ink-dim);border-radius:13px;padding:14px 22px;font-size:15px;cursor:pointer;}
  .mfoot .save{background:var(--green);border:none;color:#06210f;font-weight:700;border-radius:13px;padding:14px 26px;font-size:15px;cursor:pointer;}
  .mfoot button:active{transform:scale(.97);}

  /* ---- calendar popup ---- */
  .calpop{width:100%;max-width:430px;background:#0f1830;border:1px solid var(--card-line);border-radius:22px;padding:20px;}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .calhead .cm{font-size:22px;color:#e6ecf7;}
  .calhead button{width:46px;height:46px;border-radius:12px;background:var(--bg2);border:1px solid var(--card-line);color:var(--ink-dim);font-size:20px;cursor:pointer;}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
  .calgrid .wd{font-size:11px;color:var(--ink-faint);letter-spacing:.05em;padding:6px 0;font-weight:600;}
  .calgrid .cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink);border-radius:11px;cursor:pointer;position:relative;}
  .calgrid .cd.other{color:var(--ink-faint);opacity:.5;}
  .calgrid .cd.today{background:var(--green);color:#06210f;font-weight:700;}
  .calgrid .cd.haspin::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--green);}
  .calgrid .cd.today.haspin::after{background:#06210f;}
  .calgrid .cd:active{background:var(--card);}
  .caltoday{width:100%;margin-top:16px;padding:14px;background:transparent;border:1px solid var(--card-line);border-radius:13px;color:var(--ink-dim);font-size:15px;cursor:pointer;}

  /* ---- charts ---- */
  .segwrap{background:var(--bg2);border:1px solid var(--card-line);border-radius:16px;padding:6px;display:flex;margin:8px 0 6px;}
  .seg{flex:1;text-align:center;padding:13px 0;border-radius:11px;font-size:15px;color:var(--ink-dim);cursor:pointer;transition:.12s;}
  .seg.active{background:#1a2540;color:#fff;}
  .chartcard{background:var(--card);border:1px solid var(--card-line);border-radius:20px;padding:24px 18px;margin-top:20px;}
  .chartcard h2{font-size:24px;font-weight:500;margin:0 0 5px;color:#e6ecf7;}
  .chartcard .csub{font-size:14px;color:var(--ink-faint);margin:0 0 14px;}
  .chartcard svg{width:100%;display:block;}

  /* ---- history ---- */
  .histitem{background:var(--card);border:1px solid var(--card-line);border-radius:18px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;}
  .histitem .hi-l{flex:1;min-width:0;}
  .histitem .hi-date{font-size:19px;color:#e6ecf7;margin-bottom:6px;}
  .histitem .hi-meta{font-size:13px;color:var(--ink-faint);}
  .histitem .hi-bar{flex:1.1;max-width:150px;height:7px;border-radius:4px;background:#1c2a45;overflow:hidden;}
  .histitem .hi-bar i{display:block;height:100%;border-radius:4px;}
  .histitem .hi-score{font-size:30px;font-weight:600;min-width:50px;text-align:right;}
  .vy{margin:30px 0 10px;}
  .vy h2{font-size:24px;font-weight:500;color:#e6ecf7;margin:0 0 16px;}
  .vyrow{display:flex;gap:14px;}
  .vybtn{flex:1;padding:18px;border-radius:14px;background:var(--bg2);border:1px solid var(--card-line);color:var(--ink);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .vybtn:active{transform:scale(.97);}
  .empty{text-align:center;color:var(--ink-faint);padding:50px 20px;font-size:15px;}
  .toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2540;border:1px solid var(--card-line);color:var(--ink);padding:13px 22px;border-radius:14px;font-size:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <!-- ============ TAKİP ============ -->
  <div class="page active" id="page-takip">
    <div class="ph">
      <div class="emoji">🤫</div>
      <h1 class="serif">SESSİZLİK</h1>
      <div class="sub">30 Dakikalık Sessizlik Takibi</div>
    </div>

    <div class="datenav">
      <button class="navbtn" id="prevDay">‹</button>
      <button class="calbtn" id="openCal">📅</button>
      <div class="datelabel serif" id="dateLabel">—</div>
      <button class="navbtn" id="nextDay">›</button>
    </div>

    <div class="scoreband">
      <div class="ring">
        <svg width="185" height="185" viewBox="0 0 185 185">
          <circle cx="92.5" cy="92.5" r="84" fill="none" stroke="#1c2a45" stroke-width="6"/>
          <circle id="ringProg" cx="92.5" cy="92.5" r="84" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round" stroke-dasharray="527.8" stroke-dashoffset="527.8"/>
        </svg>
        <div class="scoretext">
          <div class="num serif" id="scoreNum" style="color:var(--green)">0</div>
          <div class="lbl">/ 100 PUAN</div>
        </div>
      </div>
      <div class="counters">
        <div class="counter"><span class="dot g"></span><span class="cv g serif" id="cntSessiz">0</span><span class="cl">Sessiz</span></div>
        <div class="counter"><span class="dot r"></span><span class="cv r serif" id="cntKonustu">0</span><span class="cl">Konuştu</span></div>
        <div class="counter"><span class="dot b"></span><span class="cv b serif" id="cntBekliyor">48</span><span class="cl">Bekliyor</span></div>
      </div>
    </div>

    <div class="legend">
      <span><i class="dot g" style="border-radius:4px"></i>Sessiz</span>
      <span><i class="dot r" style="border-radius:4px"></i>Konuştu</span>
      <span><i class="dot b" style="border-radius:4px"></i>Bekliyor</span>
    </div>

    <div id="groups"></div>

    <div class="dayactions">
      <button class="daybtn" id="allSilent">✓ Tümünü Sessiz</button>
      <button class="daybtn" id="resetDay">↺ Günü Sıfırla</button>
    </div>
  </div>

  <!-- ============ GRAFİK ============ -->
  <div class="page" id="page-grafik">
    <div class="ph">
      <div class="emoji">📊</div>
      <h1 class="serif">GRAFİKLER</h1>
      <div class="sub">Performans Analizi</div>
    </div>
    <div class="segwrap">
      <div class="seg active" data-chart="gunluk">Günlük</div>
      <div class="seg" data-chart="saatlik">Saatlik</div>
      <div class="seg" data-chart="haftalik">Haftalık</div>
      <div class="seg" data-chart="yillik">Yıllık</div>
    </div>
    <div class="datenav" style="margin:8px 0">
      <button class="navbtn" id="chartPrev">‹</button>
      <div class="datelabel serif" id="chartRange" style="min-width:200px;font-size:18px">—</div>
      <button class="navbtn" id="chartNext">›</button>
    </div>
    <div id="chartHost"></div>
  </div>

  <!-- ============ GEÇMİŞ ============ -->
  <div class="page" id="page-gecmis">
    <div class="ph">
      <div class="emoji">📅</div>
      <h1 class="serif">GEÇMİŞ</h1>
      <div class="sub">Tüm Kayıtlı Günler</div>
    </div>
    <div id="histList"></div>
    <div class="vy">
      <h2 class="serif">Veri Yönetimi</h2>
      <div class="vyrow">
        <button class="vybtn" id="exportBtn">📤 Dışa Aktar</button>
        <button class="vybtn" id="importBtn">📥 İçe Aktar</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>
    </div>
  </div>

</div>

<!-- tabbar -->
<div class="tabbar">
  <div class="tab active" data-tab="takip"><span class="ti">🤫</span>TAKİP</div>
  <div class="tab" data-tab="grafik"><span class="ti">📊</span>GRAFİK</div>
  <div class="tab" data-tab="gecmis"><span class="ti">📅</span>GEÇMİŞ</div>
</div>

<!-- slot modal -->
<div class="overlay" id="slotModal">
  <div class="modal">
    <h3 class="serif" id="mTitle">00:00 – 00:30</h3>
    <div class="mrow">
      <button class="mbtn" id="mSessiz">✓ Sessiz</button>
      <button class="mbtn" id="mKonustu">✗ Konuştu</button>
    </div>
    <textarea id="mNote" placeholder="Not ekle (isteğe bağlı)…"></textarea>
    <div class="mfoot">
      <button class="clr" id="mClear">Temizle</button>
      <button class="cancel" id="mCancel">İptal</button>
      <button class="save" id="mSave">Kaydet</button>
    </div>
  </div>
</div>

<!-- calendar popup -->
<div class="overlay" id="calModal">
  <div class="calpop">
    <div class="calhead">
      <button id="calPrev">‹</button>
      <div class="cm serif" id="calMonth">Haziran 2026</div>
      <button id="calNext">›</button>
    </div>
    <div class="calgrid" id="calGrid"></div>
    <button class="caltoday" id="calToday">Bugüne Git</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   SESSİZLİK — offline PWA, single file
   Veri: localStorage  ·  Anahtar: gün başına state[YYYY-MM-DD]
   Puan: sessiz / 48 * 100  (yuvarlanmış)
============================================================ */
(function(){
  const STORE = "sessizlik.v1";
  const AYLAR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const AY_KISA = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  const AY_KISA2 = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  const GUNLER = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const WD = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"]; // Mon-first

  const GROUPS = [
    {emoji:"🌙", label:"Gece (00:00 – 06:00)",          start:0,  end:12},
    {emoji:"🌅", label:"Sabah (06:00 – 12:00)",         start:12, end:24},
    {emoji:"☀️", label:"Öğleden Sonra (12:00 – 18:00)", start:24, end:36},
    {emoji:"🌆", label:"Akşam (18:00 – 00:00)",         start:36, end:48},
  ];

  /* ---------- storage ---------- */
  let db = load();
  function load(){
    try{ return JSON.parse(localStorage.getItem(STORE)) || {}; }
    catch(e){ return {}; }
  }
  function save(){ localStorage.setItem(STORE, JSON.stringify(db)); }

  /* ---------- date helpers ---------- */
  function keyOf(d){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function slotLabel(i){
    const sh=String(Math.floor(i/2)).padStart(2,"0"), sm=i%2?"30":"00";
    const e=i+1, eh=String(Math.floor(e/2)%24).padStart(2,"0"), em=e%2?"30":"00";
    return sh+":"+sm+" – "+eh+":"+em;
  }
  // day state: array of 48 -> null | "sessiz" | "konustu" ; notes: {idx:text}
  function dayState(key){
    if(!db[key]) db[key] = {slots:Array(48).fill(null), notes:{}};
    if(!db[key].slots) db[key].slots = Array(48).fill(null);
    if(!db[key].notes) db[key].notes = {};
    return db[key];
  }
  function dayHasData(key){
    const d=db[key]; if(!d||!d.slots) return false;
    return d.slots.some(x=>x);
  }
  function scoreOf(key){
    const d=db[key]; if(!d||!d.slots) return 0;
    const s=d.slots.filter(x=>x==="sessiz").length;
    return Math.round(s/48*100);
  }
  function countsOf(key){
    const d=dayState(key);
    const sessiz=d.slots.filter(x=>x==="sessiz").length;
    const konustu=d.slots.filter(x=>x==="konustu").length;
    return {sessiz,konustu,bekliyor:48-sessiz-konustu};
  }

  /* ---------- state ---------- */
  let current = new Date();          // selected day on Takip
  let calMonth = new Date();         // month shown in calendar
  let chartMode = "gunluk";
  let chartAnchor = new Date();      // reference date for chart window

  /* ---------- render: TAKİP ---------- */
  function renderTakip(){
    const key = keyOf(current);
    const ds = dayState(key);

    // date label
    document.getElementById("dateLabel").textContent =
      current.getDate()+" "+AYLAR[current.getMonth()]+" "+current.getFullYear()+", "+GUNLER[current.getDay()];

    // counts + score
    const c = countsOf(key);
    document.getElementById("cntSessiz").textContent = c.sessiz;
    document.getElementById("cntKonustu").textContent = c.konustu;
    document.getElementById("cntBekliyor").textContent = c.bekliyor;
    const score = scoreOf(key);
    document.getElementById("scoreNum").textContent = score;
    const col = score>=80?"var(--green)":score>=40?"var(--amber)":score>0?"var(--red)":"var(--green)";
    document.getElementById("scoreNum").style.color = col;
    const ring=document.getElementById("ringProg");
    const C=527.8; ring.style.strokeDashoffset = C - C*score/100;
    ring.style.stroke = col;

    // groups + slots
    const todayKey = keyOf(new Date());
    const nowIdx = (key===todayKey) ? (new Date().getHours()*2 + (new Date().getMinutes()>=30?1:0)) : -1;
    const host = document.getElementById("groups");
    host.innerHTML = "";
    GROUPS.forEach(g=>{
      const gEl=document.createElement("div"); gEl.className="group";
      gEl.innerHTML = `<div class="grouphead"><span class="gi">${g.emoji}</span><span class="gt">${g.label}</span><span class="gline"></span></div>`;
      const grid=document.createElement("div"); grid.className="slots";
      for(let i=g.start;i<g.end;i++){
        const st=ds.slots[i];
        const cls = st==="sessiz"?"sessiz":st==="konustu"?"konustu":"";
        const stTxt = st==="sessiz"?"Sessiz":st==="konustu"?"Konuştu":"Bekliyor";
        const slot=document.createElement("div");
        slot.className="slot "+cls+(i===nowIdx?" now":"");
        slot.innerHTML = `<div class="t">${slotLabel(i).replace(" – ","–\n")}</div><div class="s">${stTxt}</div>`+
          (ds.notes[i]?`<span class="note-dot"></span>`:``);
        slot.onclick=()=>openSlot(i);
        grid.appendChild(slot);
      }
      gEl.appendChild(grid); host.appendChild(gEl);
    });
  }

  /* ---------- slot modal ---------- */
  let editIdx=null, editChoice=null;
  function openSlot(i){
    editIdx=i;
    const ds=dayState(keyOf(current));
    editChoice = ds.slots[i];
    document.getElementById("mTitle").textContent = slotLabel(i);
    document.getElementById("mNote").value = ds.notes[i]||"";
    paintChoice();
    document.getElementById("slotModal").classList.add("show");
  }
  function paintChoice(){
    const s=document.getElementById("mSessiz"), k=document.getElementById("mKonustu");
    s.className="mbtn"+(editChoice==="sessiz"?" sel-g":"");
    k.className="mbtn"+(editChoice==="konustu"?" sel-r":"");
  }
  document.getElementById("mSessiz").onclick=()=>{editChoice="sessiz";paintChoice();};
  document.getElementById("mKonustu").onclick=()=>{editChoice="konustu";paintChoice();};
  document.getElementById("mCancel").onclick=closeSlot;
  document.getElementById("slotModal").onclick=(e)=>{ if(e.target.id==="slotModal") closeSlot(); };
  document.getElementById("mClear").onclick=()=>{
    const ds=dayState(keyOf(current)); ds.slots[editIdx]=null; delete ds.notes[editIdx];
    save(); closeSlot(); renderTakip();
  };
  document.getElementById("mSave").onclick=()=>{
    const ds=dayState(keyOf(current));
    ds.slots[editIdx]=editChoice;
    const note=document.getElementById("mNote").value.trim();
    if(note) ds.notes[editIdx]=note; else delete ds.notes[editIdx];
    save(); closeSlot(); renderTakip();
  };
  function closeSlot(){ document.getElementById("slotModal").classList.remove("show"); editIdx=null; }

  /* ---------- day actions ---------- */
  document.getElementById("allSilent").onclick=()=>{
    const ds=dayState(keyOf(current));
    for(let i=0;i<48;i++) if(!ds.slots[i]) ds.slots[i]="sessiz";
    save(); renderTakip(); toast("Boş dilimler sessiz işaretlendi");
  };
  document.getElementById("resetDay").onclick=()=>{
    const ds=dayState(keyOf(current)); ds.slots=Array(48).fill(null); ds.notes={};
    save(); renderTakip(); toast("Gün sıfırlandı");
  };
  document.getElementById("prevDay").onclick=()=>{ current.setDate(current.getDate()-1); renderTakip(); };
  document.getElementById("nextDay").onclick=()=>{ current.setDate(current.getDate()+1); renderTakip(); };

  /* ---------- calendar ---------- */
  document.getElementById("openCal").onclick=()=>{ calMonth=new Date(current); renderCal(); document.getElementById("calModal").classList.add("show"); };
  document.getElementById("calModal").onclick=(e)=>{ if(e.target.id==="calModal") document.getElementById("calModal").classList.remove("show"); };
  document.getElementById("calPrev").onclick=()=>{ calMonth.setMonth(calMonth.getMonth()-1); renderCal(); };
  document.getElementById("calNext").onclick=()=>{ calMonth.setMonth(calMonth.getMonth()+1); renderCal(); };
  document.getElementById("calToday").onclick=()=>{ current=new Date(); document.getElementById("calModal").classList.remove("show"); renderTakip(); };
  function renderCal(){
    document.getElementById("calMonth").textContent = AYLAR[calMonth.getMonth()]+" "+calMonth.getFullYear();
    const grid=document.getElementById("calGrid"); grid.innerHTML="";
    WD.forEach(w=>{ const e=document.createElement("div"); e.className="wd"; e.textContent=w; grid.appendChild(e); });
    const y=calMonth.getFullYear(), m=calMonth.getMonth();
    const first=new Date(y,m,1);
    let lead=(first.getDay()+6)%7; // Mon=0
    const dim=new Date(y,m+1,0).getDate();
    const prevDim=new Date(y,m,0).getDate();
    const todayKey=keyOf(new Date());
    for(let i=0;i<lead;i++){ const d=document.createElement("div"); d.className="cd other"; d.textContent=prevDim-lead+1+i; grid.appendChild(d); }
    for(let dd=1;dd<=dim;dd++){
      const d=document.createElement("div"); d.className="cd"; d.textContent=dd;
      const k=y+"-"+String(m+1).padStart(2,"0")+"-"+String(dd).padStart(2,"0");
      if(k===keyOf(current)) d.classList.add("today");
      if(dayHasData(k)) d.classList.add("haspin");
      d.onclick=()=>{ current=new Date(y,m,dd); document.getElementById("calModal").classList.remove("show"); renderTakip(); };
      grid.appendChild(d);
    }
    let tail=42-(lead+dim); if(tail>7) tail-=7;
    for(let i=1;i<=tail;i++){ const d=document.createElement("div"); d.className="cd other"; d.textContent=i; grid.appendChild(d); }
  }

  /* ---------- tabs ---------- */
  document.querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      const tab=t.dataset.tab;
      document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
      document.getElementById("page-"+tab).classList.add("active");
      if(tab==="grafik"){ chartAnchor=new Date(); renderChart(); }
      if(tab==="gecmis") renderHist();
      window.scrollTo(0,0);
    };
  });

  /* ---------- charts ---------- */
  document.querySelectorAll(".seg").forEach(s=>{
    s.onclick=()=>{
      document.querySelectorAll(".seg").forEach(x=>x.classList.remove("active"));
      s.classList.add("active"); chartMode=s.dataset.chart; chartAnchor=new Date(); renderChart();
    };
  });
  document.getElementById("chartPrev").onclick=()=>{ shiftChart(-1); };
  document.getElementById("chartNext").onclick=()=>{ shiftChart(1); };
  function shiftChart(dir){
    if(chartMode==="gunluk") chartAnchor.setDate(chartAnchor.getDate()+dir*30);
    else if(chartMode==="saatlik") chartAnchor.setDate(chartAnchor.getDate()+dir);
    else if(chartMode==="haftalik") chartAnchor.setDate(chartAnchor.getDate()+dir*28);
    else chartAnchor.setFullYear(chartAnchor.getFullYear()+dir);
    renderChart();
  }

  function renderChart(){
    if(chartMode==="gunluk") chartDaily();
    else if(chartMode==="saatlik") chartHourly();
    else if(chartMode==="haftalik") chartWeekly();
    else chartYearly();
  }

  function chartFrame(title,sub,inner){
    document.getElementById("chartHost").innerHTML =
      `<div class="chartcard"><h2 class="serif">${title}</h2><p class="csub">${sub}</p>${inner}</div>`;
  }
  // line chart for daily / yearly
  function lineSVG(points,labels,bars){
    const W=520,H=300,pad=34,top=20,bottom=H-40;
    const innerW=W-pad-12;
    const x=i=>pad+ (points.length<=1?innerW/2: i*innerW/(points.length-1));
    const y=v=>bottom-(v/100)*(bottom-top);
    let grid="";
    [0,25,50,75,100].forEach(g=>{ grid+=`<line x1="${pad}" y1="${y(g)}" x2="${W-12}" y2="${y(g)}" stroke="#1c2a45" stroke-width="1"/><text x="${pad-6}" y="${y(g)+4}" fill="#5a6680" font-size="11" text-anchor="end">${g}</text>`; });
    let barsSvg="";
    if(bars){
      const bw=innerW/points.length*0.5;
      points.forEach((v,i)=>{ if(v>0){ const bx=x(i)-bw/2; barsSvg+=`<rect x="${bx}" y="${y(v)}" width="${bw}" height="${bottom-y(v)}" fill="url(#amg)" rx="3"/>`; } });
    }
    let path="", dots="";
    points.forEach((v,i)=>{ path += (i===0?"M":"L")+x(i)+" "+y(v)+" "; dots+=`<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="#34d17a"/>`; });
    let xlab="";
    labels.forEach((l,i)=>{ if(l!==null) xlab+=`<text x="${x(i)}" y="${H-14}" fill="#5a6680" font-size="10" text-anchor="middle" transform="rotate(-32 ${x(i)} ${H-14})">${l}</text>`; });
    let vlab="";
    if(bars) points.forEach((v,i)=>{ if(v>0) vlab+=`<text x="${x(i)}" y="${y(v)-8}" fill="#cfd8ea" font-size="11" text-anchor="middle" font-weight="600">${v}</text>`; });
    return `<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="amg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0a830"/><stop offset="1" stop-color="#c9740a"/></linearGradient></defs>${grid}${barsSvg}<path d="${path}" fill="none" stroke="#34d17a" stroke-width="2.5" stroke-linejoin="round"/>${dots}${vlab}${xlab}</svg>`;
  }

  function chartDaily(){
    // last 30 days ending at chartAnchor
    const end=new Date(chartAnchor); end.setHours(0,0,0,0);
    const pts=[], labs=[];
    for(let i=29;i>=0;i--){
      const d=new Date(end); d.setDate(end.getDate()-i);
      pts.push(scoreOf(keyOf(d)));
      labs.push(i%2===0 ? d.getDate()+" "+AY_KISA[d.getMonth()] : null);
    }
    const start=new Date(end); start.setDate(end.getDate()-29);
    document.getElementById("chartRange").textContent =
      start.getDate()+" "+AY_KISA[start.getMonth()]+" – "+end.getDate()+" "+AY_KISA[end.getMonth()]+" "+end.getFullYear();
    chartFrame("Günlük Skor","Son 30 günlük sessizlik puanları", lineSVG(pts,labs,false));
  }

  function chartHourly(){
    // single day: per-30min, sessiz=full bar. show as 48 bars (silent ratio per slot -> 100/0)
    const key=keyOf(chartAnchor);
    const ds=dayState(key);
    document.getElementById("chartRange").textContent =
      chartAnchor.getDate()+" "+AYLAR[chartAnchor.getMonth()]+" "+chartAnchor.getFullYear();
    const W=520,H=300,pad=34,top=20,bottom=H-46;
    const innerW=W-pad-12, bw=innerW/48*0.7;
    const x=i=>pad+i*innerW/48+innerW/96;
    const y=v=>bottom-(v/100)*(bottom-top);
    let grid="";[0,25,50,75,100].forEach(g=>{grid+=`<line x1="${pad}" y1="${y(g)}" x2="${W-12}" y2="${y(g)}" stroke="#1c2a45"/><text x="${pad-6}" y="${y(g)+4}" fill="#5a6680" font-size="11" text-anchor="end">${g}</text>`;});
    let bars="";
    ds.slots.forEach((st,i)=>{
      const v= st==="sessiz"?100: st==="konustu"?0:0;
      const col= st==="sessiz"?"#34d17a": st==="konustu"?"#ef5350":"#1c2a45";
      const h= st? (bottom-y(v)) : 4;
      bars+=`<rect x="${x(i)-bw/2}" y="${st? y(v):bottom-4}" width="${bw}" height="${st?h:4}" fill="${col}" rx="1.5"/>`;
    });
    let xlab="";for(let h=0;h<=24;h+=3){const i=h*2;xlab+=`<text x="${pad+i*innerW/48}" y="${H-16}" fill="#5a6680" font-size="10" text-anchor="middle">${String(h%24).padStart(2,"0")}</text>`;}
    chartFrame("Saatlik Dağılım","Gün içi dilim durumları (yeşil sessiz · kırmızı konuştu)",
      `<svg viewBox="0 0 ${W} ${H}">${grid}${bars}${xlab}</svg>`);
  }

  function chartWeekly(){
    // average score by weekday over last 4 weeks ending at anchor
    const end=new Date(chartAnchor); end.setHours(0,0,0,0);
    const buckets=[[],[],[],[],[],[],[]]; // Mon..Sun
    for(let i=0;i<28;i++){
      const d=new Date(end); d.setDate(end.getDate()-i);
      if(dayHasData(keyOf(d))){ const wi=(d.getDay()+6)%7; buckets[wi].push(scoreOf(keyOf(d))); }
    }
    const avg=buckets.map(b=> b.length? Math.round(b.reduce((a,c)=>a+c,0)/b.length):0);
    const start=new Date(end); start.setDate(end.getDate()-27);
    document.getElementById("chartRange").textContent =
      start.getDate()+" "+AY_KISA[start.getMonth()]+" – "+end.getDate()+" "+AY_KISA[end.getMonth()]+" "+end.getFullYear();
    // bar chart
    const W=520,H=300,pad=34,top=20,bottom=H-40,innerW=W-pad-12;
    const x=i=>pad+i*innerW/7+innerW/14, bw=innerW/7*0.5;
    const y=v=>bottom-(v/100)*(bottom-top);
    let grid="";[0,25,50,75,100].forEach(g=>{grid+=`<line x1="${pad}" y1="${y(g)}" x2="${W-12}" y2="${y(g)}" stroke="#1c2a45"/><text x="${pad-6}" y="${y(g)+4}" fill="#5a6680" font-size="11" text-anchor="end">${g}</text>`;});
    let bars="",lab="";const wd=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
    avg.forEach((v,i)=>{ if(v>0){bars+=`<rect x="${x(i)-bw/2}" y="${y(v)}" width="${bw}" height="${bottom-y(v)}" fill="url(#amg2)" rx="3"/><text x="${x(i)}" y="${y(v)-8}" fill="#cfd8ea" font-size="12" text-anchor="middle" font-weight="600">${v}</text>`;} lab+=`<text x="${x(i)}" y="${H-16}" fill="#5a6680" font-size="11" text-anchor="middle">${wd[i]}</text>`;});
    chartFrame("Haftalık Ortalama","Haftanın günlerine göre ortalama",
      `<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="amg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0a830"/><stop offset="1" stop-color="#c9740a"/></linearGradient></defs>${grid}${bars}${lab}</svg>`);
  }

  function chartYearly(){
    const yr=chartAnchor.getFullYear();
    document.getElementById("chartRange").textContent = yr;
    const pts=[],labs=[];
    for(let m=0;m<12;m++){
      const scores=[];
      for(let dd=1;dd<=31;dd++){
        const d=new Date(yr,m,dd); if(d.getMonth()!==m) break;
        const k=keyOf(d); if(dayHasData(k)) scores.push(scoreOf(k));
      }
      pts.push(scores.length? Math.round(scores.reduce((a,c)=>a+c,0)/scores.length):0);
      labs.push(AY_KISA[m]);
    }
    chartFrame("Yıllık Genel Bakış","Aylara göre ortalama puanlar", lineSVG(pts,labs,true));
  }

  /* ---------- history ---------- */
  function renderHist(){
    const keys=Object.keys(db).filter(k=>dayHasData(k)).sort().reverse();
    const host=document.getElementById("histList");
    if(!keys.length){ host.innerHTML=`<div class="empty">Henüz kayıtlı gün yok.<br>Takip ekranından bir dilim işaretle.</div>`; return; }
    host.innerHTML="";
    keys.forEach(k=>{
      const [Y,M,D]=k.split("-").map(Number);
      const dObj=new Date(Y,M-1,D);
      const c=countsOf(k), sc=scoreOf(k);
      const col= sc>=80?"#34d17a": sc>=40?"#f0a830": "#ef5350";
      const el=document.createElement("div"); el.className="histitem";
      el.innerHTML=`
        <div class="hi-l">
          <div class="hi-date serif">${D} ${AYLAR[M-1]} ${Y}, ${GUNLER[dObj.getDay()]}</div>
          <div class="hi-meta">✓ ${c.sessiz} sessiz · ✗ ${c.konustu} konuştu</div>
        </div>
        <div class="hi-bar"><i style="width:${sc}%;background:${col}"></i></div>
        <div class="hi-score serif" style="color:${col}">${sc}</div>`;
      el.onclick=()=>{ current=new Date(Y,M-1,D);
        document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
        document.querySelector('.tab[data-tab="takip"]').classList.add("active");
        document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
        document.getElementById("page-takip").classList.add("active");
        renderTakip(); window.scrollTo(0,0);
      };
      host.appendChild(el);
    });
  }

  /* ---------- export / import ---------- */
  document.getElementById("exportBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="sessizlik-yedek-"+keyOf(new Date())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("Yedek indirildi");
  };
  document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("importFile").onchange=(e)=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(typeof data!=="object") throw 0;
        db=data; save(); renderHist(); renderTakip();
        toast("Veriler içe aktarıldı");
      }catch(err){ toast("Dosya okunamadı"); }
    };
    r.readAsText(f); e.target.value="";
  };

  /* ---------- toast ---------- */
  let toastT;
  function toast(msg){
    const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800);
  }

  /* ---------- service worker (offline) ---------- */
  if("serviceWorker" in navigator){
    const swCode=`
      const C="sessizlik-cache-v1";
      self.addEventListener("install",e=>{self.skipWaiting();});
      self.addEventListener("activate",e=>{e.waitUntil(clients.claim());});
      self.addEventListener("fetch",e=>{
        e.respondWith(
          caches.match(e.request).then(r=> r || fetch(e.request).then(resp=>{
            if(e.request.method==="GET" && resp.ok){
              const cp=resp.clone(); caches.open(C).then(c=>c.put(e.request,cp));
            }
            return resp;
          }).catch(()=>caches.match("./")))
        );
      });`;
    const swUrl=URL.createObjectURL(new Blob([swCode],{type:"text/javascript"}));
    navigator.serviceWorker.register(swUrl).catch(()=>{});
    // also cache the document itself for the current page
    if("caches" in window){
      caches.open("sessizlik-cache-v1").then(c=>c.add(location.href)).catch(()=>{});
    }
  }

  /* ---------- init ---------- */
  renderTakip();
})();
</script>
</body>
</html>
